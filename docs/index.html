<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logicore Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Logicore - AI Agent Framework with Memory, Tools & Provider Flexibility">
  <meta name="theme-color" content="#1a1a1a">
  
  <!-- Docsify Theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/dark.css">
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Custom Styles -->
  <style>
    :root {
      --base-font-size: 15px;
      --theme-color: #673ab7;
      --text-color: #e0e0e0;
      --border-color: #333;
      --code-theme-background: #1e1e1e;
    }

    body {
      background-color: #121212;
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
    }

    /* Sidebar Styling */
    .sidebar {
      background-color: #1a1a1a;
      border-right: 1px solid var(--border-color);
    }

    .sidebar-nav li {
      margin: 8px 0;
    }

    .sidebar-nav strong {
      color: #9c27b0;
      font-weight: 600;
      margin-top: 12px;
      display: block;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding-left: 10px;
    }

    .sidebar-nav a {
      color: #b0bec5;
      transition: color 0.2s;
      padding-left: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-nav a i {
      width: 18px;
      text-align: center;
      font-size: 15px;
      color: #673ab7;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .sidebar-nav a::before {
      display: none;
    }

    .sidebar-nav a:hover {
      color: #673ab7;
    }

    .sidebar-nav a:hover i {
      color: #9c7fdb;
    }

    .sidebar-nav li.active > a {
      color: #673ab7;
      background-color: rgba(103, 58, 183, 0.1);
      border-left: 3px solid #673ab7;
      padding-left: 12px;
    }

    .sidebar-nav li.active > a i {
      color: #9c7fdb;
    }

    /* Icon styling */
    .sidebar-nav strong::before {
      margin-right: 6px;
      display: inline-block;
    }

    /* Main Content */
    main {
      background-color: #121212;
    }

    .markdown-section {
      color: var(--text-color);
      line-height: 1.8;
    }

    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4 {
      color: #e0e0e0;
      margin-top: 24px;
      margin-bottom: 12px;
    }

    .markdown-section h1 {
      border-bottom: 2px solid var(--theme-color);
      padding-bottom: 10px;
    }

    .markdown-section code {
      background-color: var(--code-theme-background);
      color: #81c784;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Fira Code', monospace;
    }

    .markdown-section pre {
      background-color: var(--code-theme-background);
      border: 1px solid var(--border-color);
      border-radius: 6px;
    }

    .markdown-section table {
      border-collapse: collapse;
      width: 100%;
      margin: 16px 0;
    }

    .markdown-section table th {
      background-color: rgba(103, 58, 183, 0.1);
      color: #673ab7;
      padding: 12px;
      text-align: left;
      border-bottom: 2px solid var(--border-color);
    }

    .markdown-section table td {
      padding: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .markdown-section table tr:hover {
      background-color: rgba(103, 58, 183, 0.05);
    }

    .markdown-section blockquote {
      border-left: 4px solid #673ab7;
      color: #b0bec5;
      background-color: rgba(103, 58, 183, 0.05);
      padding: 12px 16px;
      margin: 16px 0;
      border-radius: 4px;
    }

    .markdown-section a {
      color: #673ab7;
      text-decoration: none;
    }

    .markdown-section a:hover {
      text-decoration: underline;
    }

    /* Navigation */
    .navbar {
      background-color: #1a1a1a;
      border-bottom: 1px solid var(--border-color);
      padding-right: 20px;
    }

    .navbar-logo {
      color: #673ab7;
      font-weight: 600;
      font-size: 18px;
    }

    /* Cover Page */
    section.cover {
      background: linear-gradient(135deg, #1a1a1a 0%, #2d1b4e 100%);
    }

    section.cover h1 {
      color: #673ab7;
      font-size: 3.5rem;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }

    section.cover p {
      color: #b0bec5;
      font-size: 1.2rem;
    }

    /* Copy buttons */
    .docsify-copy-code-button {
      background-color: #673ab7;
      color: white;
    }

    .docsify-copy-code-button:hover {
      background-color: #7e57c2;
    }

    /* Code blocks with language highlighting */
    pre[class*="language-"] {
      background-color: var(--code-theme-background) !important;
      border: 1px solid var(--border-color);
    }

    /* Emoji integration */
    .emoji {
      height: 1.2em;
      vertical-align: middle;
    }

    /* Section Header Styling */
    .markdown-section h2 i,
    .markdown-section h3 i {
      margin-right: 10px;
      font-size: 1.1em;
    }

    .markdown-section h1 i {
      margin-right: 12px;
      font-size: 1.3em;
    }

    /* Component Cards */
    .markdown-section h3 {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-left: 4px solid transparent;
      padding-left: 12px;
      transition: all 0.3s ease;
    }

    .markdown-section h3:hover {
      border-left-color: #673ab7;
      transform: translateX(4px);
    }

    .markdown-section h3 i {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    /* List Item Styling for icons in content */
    .markdown-section ul li {
      margin: 8px 0;
      line-height: 1.6;
    }

    /* Code blocks with icons */
    .markdown-section pre code {
      font-size: 0.9em;
    }

    /* Table rows with better styling */
    .markdown-section table tr td:first-child {
      font-weight: 500;
      color: #9c7fdb;
    }

    /* Link styling with icons */
    .markdown-section a {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .markdown-section a i {
      font-size: 0.9em;
      opacity: 0.8;
    }

    .markdown-section a:hover i {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: "Logicore",
      repo: "https://github.com/yourusername/logicore",
      logo: "https://via.placeholder.com/40x40/673ab7/ffffff?text=LC",
      
      // Navigation
      loadSidebar: true,
      loadNavbar: false,
      
      // Sidebar
      maxLevel: 4,
      subMaxLevel: 3,
      sidebarDisplayLevel: 1,
      
      // Content
      relativePath: false,
      routerMode: "hash",
      coverpage: false,
      
      // Search
      search: {
        maxAge: 86400000,
        paths: auto,
        placeholder: "Search documentation...",
        noData: "No results found",
        depth: 4
      },
      
      // Markdown
      markdown: {
        gfm: true,
        pedantic: false,
        breaks: false,
        sanitize: false,
        smartLists: true,
        smartypants: true
      },
      
      // Copy to Clipboard
      copyCode: {
        buttonText: "Copy",
        errorText: "Error",
        successText: "Copied"
      },
      
      // Theme
      themeColor: "#673ab7",
      
      // Plugins
      plugins: [
        function(hook, vm) {
          hook.beforeEach(function(html) {
            // Add footer
            let footer = "\n---\n";
            footer += "*Last updated: " + new Date().toLocaleDateString() + "*";
            return html + footer;
          });
        }
      ]
    };
  </script>

  <!-- Docsify Core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  
  <!-- Docsify Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  
  <!-- Syntax Highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  
  <!-- Mermaid Diagrams -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-mermaid@2/dist/docsify-mermaid.js"></script>

</body>
</html>
